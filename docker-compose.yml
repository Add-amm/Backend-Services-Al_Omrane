version: '3.8'
###################################################################################
services:
###################################################################################
  intern-api:
    build:
      context: ./services/auth-service
    container_name: auth-service
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - .env
    restart: always
###################################################################################
###################################################################################
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
###################################################################################
###################################################################################
volumes:
  mysql-data: